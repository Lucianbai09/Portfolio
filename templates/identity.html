{% extends "base.html" %}

{% block content %}
<h1 class="center_text">Identity</h1>

{% for id, title in [("hobbies", "Hobbies"), ("food", "Go-To Order"), ("artists", "Artists"), ("music", "Music")] %}
<section class="fav-section">
    <h2 class="fav-section-title">{{ title }}</h2>
    <div class="fav-carousel" id="carousel-{{ id }}">
        <button class="carousel-btn" onclick="carouselMove('{{ id }}',-1)">&#8249;</button>
        <div class="carousel-track"></div>
        <button class="carousel-btn" onclick="carouselMove('{{ id }}',1)">&#8250;</button>
    </div>
</section>
{% endfor %}

{% endblock %}

{% block scripts %}
<script>
const FAVES = {
    hobbies: {{ hobbies            | tojson }},
    food:    {{ favourites.food    | tojson }},
    artists: {{ favourites.artists | tojson }},
    music:   {{ favourites.music   | tojson }}
};
Object.entries(FAVES).forEach(function(entry) { initCarousel(entry[0], entry[1]); });
</script>
{% endblock %}
